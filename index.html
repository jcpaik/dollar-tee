<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Canvas</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="main">
    <div id="editor-pane">
      <div id="toolbar">
        <select id="demo-select"></select>
        <label><input type="checkbox" id="auto-run" checked> Auto</label>
        <button id="play-pause-btn" title="Play / Pause time">&#9654;</button>
        <span class="time-display" id="time-display">$time = 0.00</span>
        <span class="fps-display" id="fps-display"></span>
        <span class="hint">Ctrl-Enter to run<br>Ctrl-S to save</span>
        <button id="share-btn" title="Copy shareable URL">Share</button>
      </div>
      <div id="editor-container"></div>
      <div id="error-bar"></div>
    </div>
    <div id="v-sash" title="Drag to resize"></div>
    <div id="canvas-pane">
    </div>
  </div>
  <div id="bottom-panel">
    <div id="h-sash" title="Drag to resize, double-click to toggle"></div>
    <div id="panel-tabs">
      <button class="panel-tab active" data-tab="watch-tab">Watch</button>
      <button class="panel-tab" data-tab="timeline-tab">Timeline</button>
    </div>
    <div id="panel-content">
      <div id="watch-tab"></div>
      <div id="timeline-tab" style="display:none">
        <div id="transport-controls">
          <button id="music-toggle" title="Toggle music mode">&#9835; Off</button>
          <input type="file" id="audio-file" accept="audio/*" hidden>
          <span id="audio-time">&mdash;:&mdash;&mdash;</span>
          <button id="snap-btn" class="active" title="Snap to grid">Snap</button>
        </div>
        <div id="beat-grid"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
