<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Canvas</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="main">
    <div id="editor-pane">
      <div id="toolbar">
        <select id="demo-select"></select>
        <label><input type="checkbox" id="auto-run" checked> Auto</label>
        <span class="time-display" id="time-display">t = 0.00</span>
        <span class="fps-display" id="fps-display"></span>
        <span class="hint">Ctrl-Enter to run · Ctrl-S to save</span>
      </div>
      <div id="editor-container"></div>
      <div id="error-bar"></div>
    </div>
    <div id="canvas-pane">
    </div>
  </div>
  <div id="transport">
    <div id="transport-sash" title="Drag to resize, double-click to toggle"></div>
    <div id="transport-inner">
      <div id="transport-controls">
        <button id="music-toggle" title="Toggle music mode">&#9835; Off</button>
        <input type="file" id="audio-file" accept="audio/*" hidden>
        <button id="play-btn" title="Play / Pause" disabled>&#9654;</button>
        <span id="audio-time">&mdash;:&mdash;&mdash;</span>
        <button id="snap-btn" class="active" title="Snap to grid">Snap</button>
      </div>
      <div id="beat-grid"></div>
    </div>
  </div>
  <script type="module" src="/src/core/main.js"></script>
</body>
</html>
